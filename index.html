<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi en direct — Filtre ECG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

/* HEADER */
.hdr{background:#1e293b;border-bottom:1px solid #334155;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10}
.hdr h1{font-size:17px;color:#f8fafc;font-weight:600}
.hdr p{font-size:11px;color:#94a3b8;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.live{display:flex;align-items:center;gap:6px}
.live-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-txt{font-size:12px;color:#86efac;font-weight:500}
.ts{font-size:11px;color:#475569}
.refresh{background:#1e3a5f;color:#60a5fa;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}

/* LAYOUT */
.wrap{max-width:1200px;margin:0 auto;padding:18px 16px}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.mc{background:#1e293b;border:0.5px solid #334155;border-radius:10px;padding:14px}
.mc .ml{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.mc .mv{font-size:26px;font-weight:700;color:#f8fafc;font-variant-numeric:tabular-nums}
.mc .ms{font-size:11px;color:#64748b;margin-top:2px}

/* SECTION TITLE */
.section-title{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}

/* PROGRESSION INDIVIDUELLE */
.students-section{background:#1e293b;border:0.5px solid #334155;border-radius:12px;padding:16px;margin-bottom:18px}
.students-grid{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.student-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#0f172a;border-radius:8px}
.sid{font-family:monospace;font-size:12px;font-weight:600;color:#60a5fa;min-width:70px;flex-shrink:0}
.prog-wrap{flex:1}
.prog-label{display:flex;justify-content:space-between;margin-bottom:3px}
.prog-q{font-size:10px;color:#64748b}
.prog-pct{font-size:10px;font-weight:600;color:#94a3b8}
.prog-bar{height:8px;background:#1e293b;border-radius:4px;overflow:hidden;border:0.5px solid #334155}
.prog-fill{height:100%;border-radius:4px;transition:width .5s ease}
.prog-fill.done{background:#22c55e}
.prog-fill.going{background:#2563eb}
.prog-fill.start{background:#475569}
.badge-done{background:#064e3b;color:#34d399;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-cours{background:#1e3a5f;color:#60a5fa;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-start{background:#1e293b;color:#475569;font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;border:0.5px solid #334155}

/* BAR CHARTS GRID */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.chart-card{background:#1e293b;border:0.5px solid #334155;border-radius:12px;padding:14px}
.chart-card h3{font-size:12px;color:#94a3b8;margin-bottom:10px;font-weight:500}
.chart-card .question-text{font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.5;font-style:italic}

/* BAR */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;min-width:130px;flex-shrink:0;line-height:1.35;color:#94a3b8}
.bar-outer{flex:1;height:22px;background:#0f172a;border-radius:4px;overflow:hidden;position:relative}
.bar-inner{height:100%;border-radius:4px;transition:width .5s ease;min-width:2px;display:flex;align-items:center;padding-left:6px}
.bar-inner.correct{background:#16a34a}
.bar-inner.wrong{background:#dc2626}
.bar-inner.neutral{background:#334155}
.bar-count{font-size:10px;font-weight:600;color:#fff;white-space:nowrap;position:absolute;right:6px;top:50%;transform:translateY(-50%)}
.bar-pct{font-size:10px;color:#64748b;min-width:32px;text-align:right;flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:32px;color:#475569;font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Suivi en direct — Filtre ECG</h1>
    <p>Butterworth ordre 3 · f₀ = 100 Hz · 9 questions</p>
  </div>
  <div class="hdr-right">
    <div class="live"><div class="live-dot"></div><span class="live-txt">LIVE</span></div>
    <button class="refresh" onclick="manualRefresh()">↻</button>
    <span class="ts" id="ts">—</span>
  </div>
</div>

<div class="wrap">

  <!-- METRICS -->
  <div class="metrics">
    <div class="mc"><div class="ml">Connectés</div><div class="mv" id="m-total">0</div><div class="ms">ont ouvert l'exercice</div></div>
    <div class="mc"><div class="ml">Terminé</div><div class="mv" id="m-done" style="color:#22c55e">0</div><div class="ms">9/9 questions</div></div>
    <div class="mc"><div class="ml">En cours</div><div class="mv" id="m-prog" style="color:#60a5fa">0</div><div class="ms">progression active</div></div>
    <div class="mc"><div class="ml">Taux</div><div class="mv" id="m-rate">0%</div><div class="ms">de réussite globale</div></div>
  </div>

  <!-- PROGRESSION INDIVIDUELLE -->
  <div class="students-section">
    <div class="section-title" style="margin-bottom:12px">Progression individuelle</div>
    <div class="students-grid" id="students-grid">
      <div class="empty">En attente des étudiants…</div>
    </div>
  </div>

  <!-- BAR CHARTS -->
  <div class="section-title">Réponses par question</div>
  <div class="charts-grid" id="charts-grid">
    <div class="empty" style="grid-column:1/-1">En attente des données…</div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "VOTRE_PROJECT.firebaseapp.com",
  databaseURL: "https://VOTRE_PROJECT-default-rtdb.firebaseio.com",
  projectId: "VOTRE_PROJECT",
  storageBucket: "VOTRE_PROJECT.appspot.com",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId: "VOTRE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Questions metadata
const QUESTIONS = [
  { id:1, label:'Q1 — Type de filtre', short:'Quel type de filtre ?',
    opts:[{val:'ph',label:'Passe-haut'},{val:'pb2',label:'Passe-bande'},{val:'pb',label:'Passe-bas'},{val:'rej',label:'Réjecteur'}], correct:'pb' },
  { id:2, label:'Q2 — Pourquoi Butterworth ?', short:'Pourquoi Butterworth ?',
    opts:[{val:'pente',label:'Pente maximale'},{val:'plate',label:'BP la plus plate'},{val:'q',label:'Meilleur Q'},{val:'cout',label:'Coût plus faible'}], correct:'plate' },
  { id:3, label:'Q3 — Décomposition ordre 3', short:'Décomposition ?',
    opts:[{val:'trois1',label:'3× ordre 1'},{val:'2+1',label:'Ordre 2 + ordre 1'},{val:'deux2',label:'2× ordre 2'}], correct:'2+1' },
  { id:4, label:'Q4 — Schéma Sallen-Key', short:'Quel schéma est SK ?',
    opts:[{val:'A',label:'Circuit A'},{val:'B',label:'Circuit B'}], correct:'B' },
  { id:5, label:'Q5 — Facteur Q', short:'Q pour Butterworth ordre 3 ?',
    opts:[{val:'0707',label:'Q = 0.707'},{val:'1',label:'Q = 1.000'},{val:'1307',label:'Q = 1.307'}], correct:'1' },
  { id:6, label:'Q6 — Valeur de R', short:'R = ? (f₀=100Hz, C=100nF)',
    opts:[{val:'A',label:'1 592 Ω'},{val:'B',label:'15 916 Ω'},{val:'C',label:'159 Ω'}], correct:'B' },
  { id:7, label:'Q7 — Valeur de k', short:'k = ?',
    opts:[{val:'A',label:'k = 1.586'},{val:'B',label:'k = 2.000'},{val:'C',label:'k = 1.234'}], correct:'B' },
  { id:8, label:'Q8 — Valeur de Rf', short:'Rf = (k-1)×R = ?',
    opts:[{val:'A',label:'15 916 Ω'},{val:'B',label:'31 831 Ω'},{val:'C',label:'7 958 Ω'}], correct:'A' },
  { id:9, label:'Q9 — Atténuation à ω₀', short:'|H(ω₀)| en dB ?',
    opts:[{val:'m3',label:'−3 dB'},{val:'m6',label:'−6 dB'},{val:'m9',label:'−9 dB'},{val:'m20',label:'−20 dB'}], correct:'m9' },
];

function render(data) {
  if (!data) return;
  const etudiants = Object.values(data);
  const total = etudiants.length;

  // Metrics
  const done = etudiants.filter(e => e.resultats?.q9==='correct').length;
  const inprog = etudiants.filter(e => (e.question_actuelle||1)>1 && e.resultats?.q9!=='correct').length;

  // Global correct rate
  let totalAns=0, totalCorrect=0;
  etudiants.forEach(e => {
    if(!e.resultats) return;
    Object.values(e.resultats).forEach(v => { totalAns++; if(v==='correct') totalCorrect++; });
  });
  const rate = totalAns>0 ? Math.round(totalCorrect/totalAns*100) : 0;

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-prog').textContent = inprog;
  document.getElementById('m-rate').textContent = rate+'%';
  document.getElementById('ts').textContent = new Date().toLocaleTimeString('fr-FR');

  // STUDENTS GRID
  const sg = document.getElementById('students-grid');
  if(total===0){ sg.innerHTML='<div class="empty">En attente des étudiants…</div>'; }
  else {
    const sorted = [...etudiants].sort((a,b)=>(b.question_actuelle||1)-(a.question_actuelle||1));
    sg.innerHTML = sorted.map(e => {
      const q = Math.min(e.question_actuelle||1, 9);
      const isDone = e.resultats?.q9==='correct';
      const pct = Math.round((q-1)/9*100);
      const fillClass = isDone ? 'done' : q>1 ? 'going' : 'start';
      const badge = isDone
        ? '<span class="badge-done">✓ Terminé</span>'
        : q>1
          ? `<span class="badge-cours">Q${q}/9</span>`
          : '<span class="badge-start">Q1</span>';
      return `<div class="student-row">
        <div class="sid">${e.id||'—'}</div>
        <div class="prog-wrap">
          <div class="prog-label"><span class="prog-q">${isDone?'9/9 questions':q>1?((q-1)+'/9 complètes'):'Démarré'}</span><span class="prog-pct">${isDone?100:pct}%</span></div>
          <div class="prog-bar"><div class="prog-fill ${fillClass}" style="width:${isDone?100:pct}%"></div></div>
        </div>
        ${badge}
      </div>`;
    }).join('');
  }

  // BAR CHARTS
  const cg = document.getElementById('charts-grid');
  if(total===0){ cg.innerHTML='<div class="empty" style="grid-column:1/-1">En attente des données…</div>'; return; }

  cg.innerHTML = QUESTIONS.map(q => {
    // Count responses for this question
    const counts = {};
    q.opts.forEach(o => counts[o.val]=0);
    etudiants.forEach(e => {
      const rep = e.reponses?.['q'+q.id];
      if(rep && counts[rep]!==undefined) counts[rep]++;
    });
    const totalRep = Object.values(counts).reduce((a,b)=>a+b,0);
    const maxCount = Math.max(...Object.values(counts), 1);

    const bars = q.opts.map(opt => {
      const n = counts[opt.val]||0;
      const pct = totalRep>0 ? Math.round(n/totalRep*100) : 0;
      const barW = maxCount>0 ? Math.round(n/maxCount*100) : 0;
      const cls = opt.val===q.correct ? 'correct' : 'wrong';
      return `<div class="bar-row">
        <div class="bar-label">${opt.label}</div>
        <div class="bar-outer">
          <div class="bar-inner ${n===0?'neutral':cls}" style="width:${barW}%"></div>
          ${n>0?`<span class="bar-count">${n}</span>`:''}
        </div>
        <div class="bar-pct">${pct}%</div>
      </div>`;
    }).join('');

    const answered = etudiants.filter(e=>e.reponses?.['q'+q.id]).length;
    return `<div class="chart-card">
      <h3>${q.label}</h3>
      <div class="question-text">${q.short} · ${answered}/${total} ont répondu</div>
      ${bars}
    </div>`;
  }).join('');
}

// Realtime listener
const etudiantsRef = ref(db, 'etudiants');
onValue(etudiantsRef, snap => render(snap.val()));
window.manualRefresh = () => onValue(etudiantsRef, snap => render(snap.val()), {onlyOnce:true});
</script>
</body>
</html>
